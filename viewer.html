<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Command Center</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --todo-color: #ff9f1a;
            --inprogress-color: #3498db;
            --review-color: #9b59b6;
            --done-color: #2ecc71;
            --text-dark: #2c3e50;
            --text-light: #7f8c8d;
            --accent: #667eea;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); margin: 0; padding: 20px; min-height: 100vh; padding-bottom: 60px; }
        .header-container { text-align: center; margin-bottom: 30px; }
        h1 { color: #fff; font-size: 2.5rem; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .tab-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 12px 25px; border-radius: 30px; cursor: pointer; font-weight: bold; transition: all 0.3s; backdrop-filter: blur(5px); }
        .tab-btn.active { background: white; color: var(--accent); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .board { display: flex; gap: 20px; overflow-x: auto; padding: 20px 40px; align-items: flex-start; justify-content: flex-start; min-height: 70vh; }
        .column { background: rgba(235, 236, 240, 0.9); backdrop-filter: blur(5px); border-radius: 12px; width: 320px; padding: 15px; box-sizing: border-box; flex-shrink: 0; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .column-header { font-weight: 800; margin-bottom: 15px; color: var(--text-dark); padding: 10px; border-radius: 8px; text-transform: uppercase; letter-spacing: 1px; text-align: center; font-size: 0.9rem; }
        .col-todo .column-header { background-color: var(--todo-color); color: white; }
        .col-inprogress .column-header { background-color: var(--inprogress-color); color: white; }
        .col-review .column-header { background-color: var(--review-color); color: white; }
        .col-done .column-header { background-color: var(--done-color); color: white; }
        .col-member .column-header { background-color: #34495e; color: white; margin-bottom: 20px;}

        .task { background: #fff; border-radius: 10px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s; border-left: 5px solid transparent; }
        .task:hover { transform: translateY(-3px); }
        .status-Done .task { border-left-color: var(--done-color); }
        .status-InProgress .task { border-left-color: var(--inprogress-color); }
        .status-ToDo .task { border-left-color: var(--todo-color); }

        .group-label { font-size: 0.7rem; font-weight: bold; color: #7f8c8d; text-transform: uppercase; margin: 15px 0 8px 5px; display: flex; align-items: center; gap: 5px; }
        .group-label::after { content: ''; flex-grow: 1; height: 1px; background: #ddd; }

        .task-title { font-weight: bold; font-size: 1rem; margin-bottom: 5px; color: var(--text-dark); }
        .task-assignee { font-size: 0.7rem; color: #fff; background: #34495e; display: inline-block; padding: 3px 8px; border-radius: 15px; margin-bottom: 8px; font-weight: 600; }
        .status-tag { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; margin-left: 5px; color: white; vertical-align: middle; float: right; }
        .tag-todo { background: var(--todo-color); }
        .tag-inprogress { background: var(--inprogress-color); }
        .tag-done { background: var(--done-color); }

        .task-footer { font-size: 0.65rem; color: #95a5a6; margin-top: 8px; }
        .task-logs { font-size: 0.75rem; color: #2980b9; background: #f8f9fa; border-radius: 6px; padding: 6px; margin-top: 8px; border-top: 1px solid #eee; }
        .log-entry { margin-bottom: 2px; font-family: 'Courier New', monospace; }

        .milestone-container { max-width: 800px; margin: 0 auto; background: rgba(255,255,255,0.9); padding: 30px; border-radius: 15px; backdrop-filter: blur(10px); }
        .milestone-item { margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .milestone-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .milestone-title { font-size: 1.25rem; font-weight: bold; color: var(--text-dark); }
        .milestone-status { font-size: 0.8rem; padding: 4px 12px; border-radius: 15px; font-weight: bold; }
        .status-Completed { background: #d4edda; color: #155724; }
        .status-InProgress { background: #cff4fc; color: #055160; }
        .progress-container { height: 12px; background: #e9ecef; border-radius: 10px; overflow: hidden; margin: 15px 0; }
        .progress-bar { height: 100%; background: var(--accent); transition: width 0.5s ease-in-out; }
        .milestone-meta { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-light); }

        .status-bar { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.6); color: white; padding: 8px 15px; border-radius: 30px; font-size: 0.85rem; display: flex; align-items: center; gap: 10px; z-index: 1000; backdrop-filter: blur(5px); }
        .live-indicator { color: #2ecc71; font-weight: bold; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        .server-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255,255,255,0.9); border-top: 1px solid #ddd; padding: 10px 20px; font-size: 0.75rem; color: #7f8c8d; display: flex; justify-content: space-between; backdrop-filter: blur(10px); box-sizing: border-box; }
        .server-badge { background: #34495e; color: white; padding: 2px 8px; border-radius: 4px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="status-bar"><span class="live-indicator">● LIVE</span><span id="last-sync">Last sync: Never</span></div>
    <div class="header-container">
        <h1>🚀 AI Agent Command Center</h1>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('kanban')">📋 Kanban Board</button>
            <button class="tab-btn" onclick="switchTab('team')">👥 Team Matrix</button>
            <button class="tab-btn" onclick="switchTab('milestones')">🚩 Milestones</button>
        </div>
    </div>

    <div id="kanban" class="tab-content active"><div class="board" id="board">Loading...</div></div>
    <div id="team" class="tab-content"><div class="board" id="team-board">Loading...</div></div>
    <div id="milestones" class="tab-content"><div class="milestone-container" id="milestone-list">Loading...</div></div>

    <div class="server-footer">
        <div>Server: <span id="server-lang" class="server-badge">Detecting...</span> | Path: <span id="server-path">Detecting...</span></div>
        <div id="server-cmd" style="font-family: monospace;">Detecting command...</div>
    </div>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if (event) event.currentTarget.classList.add('active');
        }

        async function fetchServerInfo() {
            try {
                const response = await fetch('/server-info');
                const info = await response.json();
                document.getElementById('server-lang').textContent = info.language;
                document.getElementById('server-path').textContent = info.baseDir;
                document.getElementById('server-cmd').textContent = info.command;
            } catch (e) { console.error("Could not fetch server info"); }
        }

        async function fetchKanban() {
            try {
                const response = await fetch('kanban.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error("File not found");
                const data = await response.json();
                renderBoard(data);
                renderTeamMatrix(data);
                renderMilestones(data);
                document.getElementById('last-sync').textContent = 'Last sync: ' + new Date().toLocaleTimeString();
            } catch (error) { 
                console.error("Error fetching data:", error); 
                document.getElementById('last-sync').textContent = 'Error: kanban.json not found';
            }
        }

        function renderBoard(data) {
            const board = document.getElementById('board'); board.innerHTML = '';
            data.columns.forEach(colName => {
                const columnDiv = document.createElement('div');
                columnDiv.className = 'column col-' + colName.toLowerCase().replace(/\s+/g, '');
                columnDiv.innerHTML = `<div class="column-header">${colName}</div>`;
                data.tasks.filter(t => t.status === colName).forEach(task => {
                    const taskDiv = document.createElement('div');
                    taskDiv.className = 'task';
                    taskDiv.innerHTML = `<div class="task-title">${task.title}</div><div class="task-assignee">👤 ${task.assignee}</div><div class="task-footer">Last: ${task.updated_at}</div>`;
                    if (task.logs) {
                        const logs = document.createElement('div'); logs.className = 'task-logs';
                        logs.innerHTML = task.logs.slice(-2).map(l => `<div class="log-entry">▶ ${l}</div>`).join('');
                        taskDiv.appendChild(logs);
                    }
                    columnDiv.appendChild(taskDiv);
                });
                board.appendChild(columnDiv);
            });
        }

        function renderTeamMatrix(data) {
            const board = document.getElementById('team-board'); board.innerHTML = '';
            const assignees = [...new Set(data.tasks.map(t => t.assignee))];
            assignees.forEach(member => {
                const columnDiv = document.createElement('div');
                columnDiv.className = 'column col-member';
                columnDiv.innerHTML = `<div class="column-header">👤 ${member}</div>`;
                const groups = [{ label: 'Doing', s: ['In Progress', 'Review'] }, { label: 'Todo', s: ['To Do'] }, { label: 'Finished', s: ['Done'] }];
                groups.forEach(g => {
                    const tasks = data.tasks.filter(t => t.assignee === member && g.s.includes(t.status));
                    if (tasks.length > 0) {
                        columnDiv.innerHTML += `<div class="group-label">${g.label}</div>`;
                        tasks.forEach(t => {
                            columnDiv.innerHTML += `
                                <div class="status-${t.status.replace(/\s+/g, '')}">
                                    <div class="task">
                                        <div class="task-title">${t.title} <span class="status-tag tag-${t.status.toLowerCase().replace(/\s+/g, '')}">${t.status}</span></div>
                                        <div class="task-footer">Updated: ${t.updated_at}</div>
                                    </div>
                                </div>`;
                        });
                    }
                });
                board.appendChild(columnDiv);
            });
        }

        function renderMilestones(data) {
            const list = document.getElementById('milestone-list'); if (!data.milestones) return;
            list.innerHTML = data.milestones.map(m => `
                <div class="milestone-item">
                    <div class="milestone-header"><div class="milestone-title">${m.title}</div><div class="milestone-status status-${m.status}">${m.status}</div></div>
                    <div class="progress-container"><div class="progress-bar" style="width: ${m.progress}%"></div></div>
                    <div class="milestone-meta"><span>Progress: <strong>${m.progress}%</strong></span><span>Due: <strong>${m.due_date}</strong></span></div>
                </div>`).join('');
        }

        fetchServerInfo();
        fetchKanban();
        setInterval(fetchKanban, 2000);
    </script>
</body>
</html>
